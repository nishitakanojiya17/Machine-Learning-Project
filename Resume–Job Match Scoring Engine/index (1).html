<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeMatch — AI Scoring Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4ff;
      --surface: #edeaff;
      --card: #ffffff;
      --border: #ddd8ff;
      --accent: #5b3ff8;
      --accent2: #e03e3e;
      --accent3: #00a87a;
      --text: #1a1535;
      --muted: #7a72a0;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,63,248,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,63,248,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glows */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(91,63,248,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* ─── Header ─── */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.7s ease both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(123,97,255,0.12);
      border: 1px solid rgba(123,97,255,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    h1 {
      font-family: var(--font-head);
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    header p {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    /* ─── Grid Layout ─── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
      animation: fadeUp 0.7s 0.15s ease both;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ─── Cards ─── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(91,63,248,0.07);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:focus-within::before { opacity: 1; }

    .card-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-label .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .dot-purple { background: var(--accent); }
    .dot-red { background: var(--accent2); }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.7;
      resize: none;
      height: 260px;
    }

    textarea::placeholder { color: #bbb8d4; }

    /* ─── Score Button ─── */
    .score-btn {
      width: 100%;
      padding: 18px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.7s 0.25s ease both;
    }

    .score-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(91,63,248,0.35);
    }

    .score-btn:active { transform: translateY(0); }

    .score-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    }

    .score-btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    /* ─── Results ─── */
    #results {
      display: none;
      animation: fadeUp 0.5s ease both;
    }

    .results-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    @media (max-width: 720px) {
      .results-grid { grid-template-columns: 1fr; }
    }

    /* ─── Score Dial ─── */
    .score-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 16px rgba(91,63,248,0.07);
    }

    .dial-wrap {
      position: relative;
      width: 160px; height: 160px;
    }

    .dial-svg {
      transform: rotate(-90deg);
      width: 100%; height: 100%;
    }

    .dial-bg { fill: none; stroke: var(--border); stroke-width: 12; }

    .dial-fill {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                  stroke 0.5s ease;
    }

    .dial-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-num {
      font-family: var(--font-head);
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
    }

    .score-grade {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .score-label {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
    }

    /* ─── Stats Row ─── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-val {
      font-family: var(--font-head);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-lbl {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ─── Right Panel ─── */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 2px 16px rgba(91,63,248,0.07);
    }

    .info-title {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Skill tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }

    .tag-match { background: rgba(0,217,163,0.12); color: var(--accent3); border: 1px solid rgba(0,217,163,0.25); }
    .tag-miss  { background: rgba(255,107,107,0.12); color: var(--accent2); border: 1px solid rgba(255,107,107,0.25); }
    .tag-extra { background: rgba(123,97,255,0.12); color: var(--accent); border: 1px solid rgba(123,97,255,0.25); }

    .empty-msg { color: var(--muted); font-size: 12px; font-style: italic; }

    /* Recommendations */
    .rec-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

    .rec-list li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 13px;
      line-height: 1.6;
    }

    .rec-icon {
      flex-shrink: 0;
      width: 20px; height: 20px;
      background: rgba(123,97,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      margin-top: 2px;
    }

    /* ─── Error ─── */
    .error-box {
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--accent2);
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    /* ─── Animations ─── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .legend {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="badge">AI-Powered · NLP Engine</div>
      <h1>Resume<br/>Match Engine</h1>
      <p>Paste your resume & job description → get an instant fit score</p>
    </header>

    <div class="grid">
      <div class="card">
        <div class="card-label">
          <span class="dot dot-purple"></span>
          Candidate Resume
        </div>
        <textarea id="resume" placeholder="Paste your resume text here...

Example:
John Doe | Python Developer
Skills: Python, Django, PostgreSQL, Docker, AWS, REST APIs
Experience: 3 years building scalable backend services..."></textarea>
      </div>

      <div class="card">
        <div class="card-label">
          <span class="dot dot-red"></span>
          Job Description
        </div>
        <textarea id="jd" placeholder="Paste the job description here...

Example:
We are looking for a Backend Engineer with experience in Python, FastAPI, PostgreSQL, Docker, and AWS. The ideal candidate has 2+ years of experience building REST APIs..."></textarea>
      </div>
    </div>

    <button class="score-btn" id="scoreBtn" onclick="analyzeMatch()">
      ⚡ Analyze Match Score
    </button>

    <div class="error-box" id="errorBox"></div>

    <div id="results">
      <div class="results-grid">

        <!-- Left: Score Dial -->
        <div class="score-card">
          <div class="dial-wrap">
            <svg class="dial-svg" viewBox="0 0 160 160">
              <circle class="dial-bg" cx="80" cy="80" r="70" />
              <circle class="dial-fill" id="dialFill" cx="80" cy="80" r="70"
                      stroke="var(--accent)" />
            </svg>
            <div class="dial-center">
              <div class="score-num" id="scoreNum">--</div>
              <div class="score-grade" id="scoreGrade">GRADE</div>
            </div>
          </div>
          <div class="score-label" id="scoreLabel">—</div>

          <div class="stats-row">
            <div class="stat-box">
              <div class="stat-val" id="simPct">—</div>
              <div class="stat-lbl">Text Match</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" id="skillPct">—</div>
              <div class="stat-lbl">Skill Match</div>
            </div>
          </div>
        </div>

        <!-- Right Panel -->
        <div class="right-panel">

          <!-- Skills Breakdown -->
          <div class="info-card">
            <div class="info-title">Skills Analysis</div>
            <div class="legend">
              <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div> Matched</div>
              <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> Missing</div>
              <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Extra</div>
            </div>
            <div class="tags" id="skillTags"></div>
          </div>

          <!-- Recommendations -->
          <div class="info-card">
            <div class="info-title">💡 AI Recommendations</div>
            <ul class="rec-list" id="recList"></ul>
          </div>

        </div>
      </div>
    </div>

  </div>

  <script>
    const API = "http://localhost:5000/api/score";

    // Sample data for demo (when backend not connected)
    function mockScore(resumeText, jdText) {
      // Simple client-side mock for demo purposes
      const resumeWords = new Set(resumeText.toLowerCase().split(/\W+/));
      const jdWords = jdText.toLowerCase().split(/\W+/).filter(w => w.length > 3);
      const matches = jdWords.filter(w => resumeWords.has(w));
      const similarity = Math.min((matches.length / Math.max(jdWords.length, 1)) * 1.8 * 100, 95);

      const techSkills = ["python","java","javascript","react","node","django","flask","sql","aws","docker","git","nlp","typescript","kubernetes","redis","mongodb","postgres","tensorflow","pytorch"];
      const resumeLower = resumeText.toLowerCase();
      const jdLower = jdText.toLowerCase();
      const resumeSkills = techSkills.filter(s => resumeLower.includes(s));
      const jdSkills = techSkills.filter(s => jdLower.includes(s));
      const matched = resumeSkills.filter(s => jdSkills.includes(s));
      const missing = jdSkills.filter(s => !resumeSkills.includes(s));
      const extra = resumeSkills.filter(s => !jdSkills.includes(s));
      const skillPct = jdSkills.length ? (matched.length / jdSkills.length) * 100 : 0;
      const score = Math.min(Math.round(similarity * 0.6 + skillPct * 0.4), 100);

      let grade, label;
      if (score >= 80) { grade = "A"; label = "Excellent Match"; }
      else if (score >= 65) { grade = "B"; label = "Good Match"; }
      else if (score >= 50) { grade = "C"; label = "Average Match"; }
      else if (score >= 35) { grade = "D"; label = "Weak Match"; }
      else { grade = "F"; label = "Poor Match"; }

      const recs = [];
      if (missing.length) recs.push(`Add these missing skills: ${missing.slice(0,5).join(', ')}`);
      if (score < 50) recs.push("Tailor your resume language to match the job description more closely.");
      if (!recs.length) recs.push("Great match! Highlight your key achievements with metrics.");

      return { score, grade, label, similarity: Math.round(similarity), skill_match_pct: Math.round(skillPct),
               skills: { matched, missing, extra }, recommendations: recs };
    }

    async function analyzeMatch() {
      const resume = document.getElementById("resume").value.trim();
      const jd = document.getElementById("jd").value.trim();
      const btn = document.getElementById("scoreBtn");
      const errorBox = document.getElementById("errorBox");

      if (!resume || !jd) {
        showError("Please paste both your resume and the job description.");
        return;
      }

      // Loading state
      btn.classList.add("loading");
      btn.innerHTML = '<span class="spinner"></span> Analyzing...';
      errorBox.style.display = "none";
      document.getElementById("results").style.display = "none";

      let data;
      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ resume, job_description: jd }),
          signal: AbortSignal.timeout(5000)
        });
        data = await res.json();
      } catch (e) {
        // Backend not running — use client-side mock
        await new Promise(r => setTimeout(r, 1200));
        data = mockScore(resume, jd);
      }

      renderResults(data);
      btn.classList.remove("loading");
      btn.innerHTML = "⚡ Analyze Match Score";
    }

    function renderResults(data) {
      // Score number
      document.getElementById("scoreNum").textContent = data.score;
      document.getElementById("scoreGrade").textContent = `Grade: ${data.grade}`;
      document.getElementById("scoreLabel").textContent = data.label;
      document.getElementById("simPct").textContent = data.similarity + "%";
      document.getElementById("skillPct").textContent = data.skill_match_pct + "%";

      // Color based on score
      const fill = document.getElementById("dialFill");
      const scoreNum = document.getElementById("scoreNum");
      let color;
      if (data.score >= 80) color = "var(--accent3)";
      else if (data.score >= 65) color = "#7b61ff";
      else if (data.score >= 50) color = "#ffb347";
      else color = "var(--accent2)";

      fill.style.stroke = color;
      scoreNum.style.color = color;

      // Animate dial (circumference of r=70 circle ≈ 440)
      const offset = 440 - (440 * data.score / 100);
      requestAnimationFrame(() => {
        fill.style.strokeDashoffset = offset;
      });

      // Skills
      const container = document.getElementById("skillTags");
      container.innerHTML = "";

      if (!data.skills.matched.length && !data.skills.missing.length && !data.skills.extra.length) {
        container.innerHTML = '<span class="empty-msg">No tech skills detected. Try adding specific technologies.</span>';
      } else {
        data.skills.matched.forEach(s => {
          container.innerHTML += `<span class="tag tag-match">✓ ${s}</span>`;
        });
        data.skills.missing.forEach(s => {
          container.innerHTML += `<span class="tag tag-miss">✗ ${s}</span>`;
        });
        data.skills.extra.forEach(s => {
          container.innerHTML += `<span class="tag tag-extra">+ ${s}</span>`;
        });
      }

      // Recommendations
      const recList = document.getElementById("recList");
      recList.innerHTML = data.recommendations.map(r =>
        `<li><div class="rec-icon">→</div><span>${r}</span></li>`
      ).join("");

      document.getElementById("results").style.display = "block";
      document.getElementById("results").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function showError(msg) {
      const errorBox = document.getElementById("errorBox");
      errorBox.textContent = "⚠ " + msg;
      errorBox.style.display = "block";
    }
  </script>
</body>
</html>
